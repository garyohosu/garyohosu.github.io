name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 JST (UTC+9 = UTC-9h → 21:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ainews:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run ainews skill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_SKIP_PERMISSION_PROMPTS: 'true'
        run: |
          claude --dangerously-skip-permissions -p "/ainews"

      - name: Commit and push
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/
          DATE=$(date '+%Y-%m-%d' --date='TZ="Asia/Tokyo"')
          git commit -m "feat(blog): add AI news article ${DATE} [automated]"
          git push
