name: Daily AI News Post

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 AM JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ainews
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI News Post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          claude --print "$(cat ainews.md)" \
            --allowedTools "WebSearch,WebFetch,Bash,Read,Write,Edit" \
            --output-format text

      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/
          git commit -m "feat(ainews): daily AI news post $(TZ='Asia/Tokyo' date +'%Y-%m-%d')"
          git push origin main
