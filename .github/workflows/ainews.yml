name: "Daily AI News Post"

on:
  schedule:
    - cron: "0 21 * * *"  # 6:00 AM JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic feedparser

      - name: Generate AI news post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate-ainews.py

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new post generated"
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "feat(blog): add daily AI news post ${DATE}"
            git push
          fi
