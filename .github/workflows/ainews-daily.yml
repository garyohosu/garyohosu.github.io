name: "Daily AI News Post"

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 6:00 AM JST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run ainews task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          claude -p "$(cat ainews.md)" \
            --allowedTools "WebSearch" "Bash" "Write" "Read" \
            --max-turns 50

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/
          if git diff --staged --quiet; then
            echo "No new files to commit"
            exit 0
          fi
          git commit -m "feat(blog): daily AI news post $(date -u +%Y-%m-%d)"
          git push origin main
