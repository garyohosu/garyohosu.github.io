name: "Daily AI News"

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 6:00 JST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ainews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Generate AI News Post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "/ainews"

      - name: Commit and Push
        run: |
          git add _posts/ assets/img/
          if git diff --staged --quiet; then
            echo "No new posts generated."
          else
            git commit -m "chore(ainews): add daily AI news post $(date +'%Y-%m-%d')"
            git push origin main
          fi
