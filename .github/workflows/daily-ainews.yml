name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 6:00 JST (= 21:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI news post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          claude -p "$(cat ainews.md)" \
            --allowedTools "Bash,Read,Write,Edit,WebSearch,WebFetch" \
            --max-turns 50 \
            --output-format text

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/ || true
          if git diff --cached --quiet; then
            echo "No new content generated"
            exit 0
          fi
          git commit -m "feat(ainews): add daily AI news post $(date +'%Y-%m-%d')"
          git push
