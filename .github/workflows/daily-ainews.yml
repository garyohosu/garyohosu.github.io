name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 6:00 JST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ainews
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI News article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p "$(cat ainews.md)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/img/
          if git diff --cached --quiet; then
            echo "No new files generated"
          else
            git commit -m "feat: daily AI news $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
            git push origin main
          fi
