name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 JST (UTC+9)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate AI news post
        run: node scripts/ainews-generate.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
            exit 0
          fi
          DATE=$(node -e "const d=new Date(Date.now()+9*3600*1000);console.log(d.toISOString().slice(0,10))")
          git commit -m "feat(posts): add AI news post for ${DATE}"
          git push
