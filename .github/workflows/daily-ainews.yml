name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 AM JST (JST = UTC+9, so 6:00 JST = 21:00 UTC)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate AI News Article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TZ: Asia/Tokyo
        run: node scripts/generate-ainews.mjs

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/img/
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily AI news $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push origin main
          else
            echo "No changes to commit (article may already exist for today)"
          fi
