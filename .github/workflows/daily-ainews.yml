name: "Daily AI News"

on:
  schedule:
    - cron: "0 21 * * *"  # 6:00 AM JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "daily-ainews"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Generate AI news article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "/ainews" \
            --allowedTools "Bash,Read,Write,Edit,WebSearch,WebFetch" \
            --dangerously-skip-permissions \
            --max-turns 40

      - name: Commit and push
        run: |
          git add _posts/ assets/img/ CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No new article generated"
            exit 0
          fi
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          git commit -m "Add daily AI news article ${DATE}"
          git push origin main
