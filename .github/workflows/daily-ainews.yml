name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 6:00 AM JST (UTC+9) daily
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: ainews
  cancel-in-progress: false

jobs:
  create-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create AI News Post
        run: |
          claude --dangerously-skip-permissions -p \
            "ainews.mdを読んでその指示に従い、今日のAIニュース記事を作成して_postsに保存してください。CHANGELOG.mdも更新してください。"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        id: push
        run: |
          git add _posts/ assets/img/ CHANGELOG.md ainews.md
          if git diff --cached --quiet; then
            echo "No new content — skipping commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          git commit -m "Add AI news post ${TODAY}"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-deploy.yml --ref main
