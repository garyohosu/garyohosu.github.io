name: "Daily AI News"

on:
  schedule:
    - cron: "0 21 * * *"  # 毎日 6:00 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  ainews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ainews skill
        uses: anthropics/claude-code-action@beta
        with:
          prompt: |
            `.claude/skills/ainews/SKILL.md` を読み、その手順に従ってください。
            要約: `ainews.md` を読み、そこに書かれた形式と手順に従い、今日の日付でAIニュースブログ記事を `_posts/` に作成してください。
            AGENTS.md のチェックリスト（記事作成前・記事作成時）を必ず確認してください。
            記事作成後は git add・commit・push は不要です（次のステップで自動実行します）。
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Add daily AI news $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
