name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日6:00 JST (UTC+9 = 前日21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI news post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions -p \
            "ainews.md を読んで、その指示に従って今日のAIニュース記事を作成してください。記事は _posts/ に保存し、ainews.md も最新記事で更新してください。"

      - name: Commit and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add _posts/ ainews.md assets/img/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily AI news $(date +%Y-%m-%d)"
            git push origin main
          fi
