name: "Daily AI News Post"

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 06:00 JST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ainews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate AI News Article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          claude --dangerouslySkipPermissions -p "$(cat ainews.md)"

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/ assets/img/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(date +%Y-%m-%d)
          git commit -m "feat(posts): add AI news article for $TODAY"
          git push
