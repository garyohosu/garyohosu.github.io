name: "Daily AI News"

on:
  schedule:
    # 06:00 JST = 21:00 UTC (runs the day before in UTC terms)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "daily-ainews"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Generate AI news article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-ainews.mjs

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new article — nothing to commit."
          else
            git commit -m "Add daily AI news: $(date -u +%Y-%m-%d)"
            git push
          fi
